name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Node.js 설정
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 의존성 설치
      - name: Install dependencies
        run: |
          cd my-app
          npm install

      # 4. React app 빌드
      - name: Build React app
        run: |
          cd my-app
          npm run build

      # 5. EC2 파일로 복사
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.6
        with:
          host: "${{ secrets.EC2_HOST }}"
          username: ec2-user
          key: "${{ secrets.EC2_KEY }}"
          source: "my-app/*"
          target: "/home/ec2-user/my-app"

      # 6. SSH 접속 & Docker 배포
      - name: SSH & Deploy Docker
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: "${{ secrets.EC2_HOST }}"
          username: ec2-user
          key: "${{ secrets.EC2_KEY }}"
          script: |
            cd /home/ec2-user/my-app
            docker stop react-app || true
            docker rm react-app || true
            docker build -t react-nginx .
            docker run -d -p 8080:80 -p 443:443 --name react-app react-nginx
