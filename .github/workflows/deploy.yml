name: Dockerized Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # [트러블슈팅 포인트: 경로 에러 유도]
      # React 프로젝트가 'my-app' 폴더 안에 있다면 아래 명령어로 에러를 낸다
      - name: Build Docker Image (Error Point)
        run: |
          # cd my-app 성공시키기 위해 수정한 부분
          cd my-app
          docker build -t my-react-app .

      # [성공 시나리오] 나중에 아래처럼 수정해서 성공 시킨다
      # run: docker build -t my-react-app ./my-app

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: "${{ secrets.EC2_HOST }}"
          username: ec2-user
          key: "${{ secrets.EC2_KEY }}"
          script: |
            # 서버의 실제 프로젝트 폴더로 정확히 이동
            cd /home/ec2-user/my-project
            # 최신 코드 깃허브에서 가져오기
            git pull origin main

            # Docker Compose로 컨테이너 빌드 및 실행
            # sudo가 필요할 수 있으니 안전하게 붙여준다
            # 서버에 설치된 docker-compose.yml을 사용해 빌드 및 실행
            sudo docker compose up -d --build
