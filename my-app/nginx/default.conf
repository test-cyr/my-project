server {
   listen 80;
   server_name _;

   location / {
       root /usr/share/nginx/html;
       index index.html;
       try_files $uri /index.html;
   }
}

server {
   listen 443 ssl;
   server_name _;

   ssl_certificate /etc/nginx/ssl/selfsigned.crt;
   ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

   location / {
       root /usr/share/nginx/html;
       index index.html;
       try_files $uri /index.html;
   }
}
